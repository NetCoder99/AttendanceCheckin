<div id="modal_rank_required" class="modal p-3">
    <div class="modal-dialog">
    <div class="modal-content">

        <h4 id="studentHeader"   class="fw-bold mb-2 mt-4 text-center text-success">Hello - {{form.student_name}}</h4>
        <h4 id="studentGreeting" class="fw-bold mb-2 mt-1 text-center text-success">Please enter your current rank.</h4>

        <form id="frm_required_rank" hx-post="{% url 'update_required_rank' %}"
            class="mb-4 p-4">
            {% csrf_token %}
            <input type="hidden" name="badge_number" value="{{ form.badge_number }}" />
            {{ form.badge_number.as_hidden }}
            <div class="row">
                <div id="div_required_ranks " class="col-6">
                    <span class="label-text fw-bold">Your current rank</span>
                </div>
                <div id="div_required_ranks_select" class="col-6">
                    {{ form.required_ranks}}
                </div>
            </div>

            {% include 'belt_stripes.html' %}

            <div class="row modal-action">
                <div class="d-flex justify-content-end mt-3 mb-3 me-3">
                    <button id="btn_rank_modal_close"
                            name="btn_rank_modal_close"
                            type="reset"
                            class="btn btn-danger me-3"
                            onclick="clearAllRankRequiredInputs(); "
                            data-bs-dismiss="modal"
                            >Cancel</button>
                    <button type="submit" class="btn btn-success me-3">Submit</button>
                </div>
            </div>

            <div class="row text-center">
                <span id="rank_update_message" class="text-success fw-bold">Rank update message</span>
            </div>

        </form>
    </div>
    </div>
</div>

<script>
    function clearAllRankRequiredInputs() {
        console.log(`clearAllRankRequiredInputs`);
        var inputs = document.querySelectorAll('#contact_modal input');
        inputs.forEach(function(input) {
            input.value = '';
        });
        document.getElementById('badgeNumber').disabled = false;
        document.getElementById('checkinMessage').innerHTML = "";
        document.getElementById('promotionMessage').innerHTML = "";
        document.getElementById('otherMessage').innerHTML = "";
    }
</script>
