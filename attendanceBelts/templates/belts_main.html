{% load static %}
{% load django_htmx %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rising Sun Class Checkin</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.22/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    {% htmx_script %}
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>
<body class="">
<div class="navbar bg-gray-100 sticky top-0 z-50">
  <!-- Navbar content here -->
  <div class="w-32">
    <a class="btn btn-ghost text-xl" href="/">Check Ins</a>
  </div>
  <div class="w-32">
    <a class="btn btn-ghost text-xl" href="/get_belts">Belts</a>
  </div>
  <div class="flex-none">
    <button class="btn btn-square btn-ghost">
      <!-- SVG icon or other content -->
    </button>
  </div>
</div>
<div class="grid grid-cols-1 mt-16 mb-8">

    <div class="m-auto">
        <img id="checkin_img_banner"
             name="checkin_img_banner"
             src="{% static 'rising-sun-martial-arts-logo.jpg' %}"
             alt="Belts Image"
             class="banner object-center"
             width="800"/>
    </div>
</div>

</body>
<script>
    window.onload = function(){
     console.log("Belts main window has been loaded");
     startDateTimerInterval();
    };
</script>
</html>
