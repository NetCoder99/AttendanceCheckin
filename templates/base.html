<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - FlaskApp</title>
    {% block styles %}{% endblock %}
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap-5.3.8-dist/css/bootstrap.min.css') }}">
</head>
<body>
    <nav class="navbar navbar-collapse  navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container-fluid collapse navbar-collapse">
        <a class="navbar-brand" href="#">Attendance Tracker</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item {% if request.path == url_for('checkin') %}active{% endif %}">
              <a class="nav-link" href="{{ url_for('checkin') }}">Checkin</a>
            </li>
            <li class="nav-item {% if request.path == url_for('students') %}active{% endif %}">
              <a class="nav-link" href="{{ url_for('students') }}">Students</a>
            </li>
            <li class="nav-item {% if request.path == url_for('tables') %}active{% endif %}">
              <a class="nav-link" href="{{ url_for('tables') }}">Tables</a>
            </li>
            <li class="ms-auto float-end nav-item {% if request.path == url_for('about') %}active{% endif %}">
              <a class="nav-link " href="{{ url_for('about') }}">About</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <hr>
    <div class="content">
        {% block content %}{% endblock %}
        {% block javascripts %}
            <script src="static/scripts/htmx.min.js"></script>
            <script src="static/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
        {% endblock %}
    </div>
</body>
</html>
